<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プログラミングでGO!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app-container">
    
    <div id="title-screen">
        <h1>プログラミングでGO!</h1>
        <p>コードの実行結果を素早く答えよう</p>
        
        <div id="best-score-container">
            <h3>👑 ベストスコア 👑</h3>
            <p>イージー: <span id="best-easy">0</span>点</p>
            <p>ノーマル: <span id="best-normal">0</span>点</p>
            <p>ハード: <span id="best-hard">0</span>点</p>
        </div>

        <div id="difficulty-buttons">
            <button class="diff-btn" id="btn-easy" data-level="easy">イージー</button>
            <button class="diff-btn" id="btn-normal" data-level="normal">ノーマル</button>
            <button class="diff-btn" id="btn-hard" data-level="hard">ハード</button>
        </div>
    </div>

    <div id="game-screen" style="display: none;">
        <div id="score-board">
            <span>スコア: <span id="score">0</span></span>
            <span>正解数: <span id="correct-count">0</span></span>
            <span>ライフ: <span id="lives-display">❤️❤️❤️</span></span>
        </div>

        <div id="timer-container">
            <div id="timer-bar"></div>
        </div>

        <div id="language-hint">実行結果を答えよ</div>
        <div id="code-display">
            <pre><code id="code-text">Ready?</code></pre>
        </div>

        <div id="input-area">
            <input type="text" id="type-input" autocomplete="off" disabled placeholder="答えを入力してEnter...">
        </div>

        <button id="back-btn" style="display: none;">タイトルへ戻る</button>
    </div>

</div>

<script src="main.js"></script>
</body>
</html>
